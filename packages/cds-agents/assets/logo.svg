<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090E17" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>

    <!-- Face Gradients -->
    <linearGradient id="leftFace" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E3A8A" /> <!-- SAP Blue Dark -->
      <stop offset="100%" stop-color="#172554" /> 
    </linearGradient>

    <linearGradient id="rightFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#581C87" /> <!-- AI Purple Dark -->
      <stop offset="100%" stop-color="#3B0764" />
    </linearGradient>

    <linearGradient id="topFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE" /> <!-- Tech Cyan -->
      <stop offset="50%" stop-color="#8B5CF6" /> <!-- LangChain Purple -->
      <stop offset="100%" stop-color="#D946EF" /> <!-- AI Pink -->
    </linearGradient>

    <linearGradient id="dbHighlight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#93C5FD" />
    </linearGradient>

    <!-- Glow & Shadow Filters -->
    <filter id="cubeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="25" stdDeviation="20" flood-color="#000000" flood-opacity="0.8" />
    </filter>
    
    <filter id="aura" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="sparkleGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- App Icon Background -->
  <rect width="512" height="512" rx="110" fill="url(#bgGradient)" />
  
  <!-- Subtle Grid Background -->
  <path d="M 0 128 L 512 128 M 0 256 L 512 256 M 0 384 L 512 384 M 128 0 L 128 512 M 256 0 L 256 512 M 384 0 L 384 512" 
        stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="2" />

  <!-- Background Glowing Aura behind the cube -->
  <circle cx="256" cy="256" r="140" fill="#8B5CF6" opacity="0.25" filter="url(#aura)" />

  <!-- ==================== THE ISOMETRIC PACKAGE ==================== -->
  <g filter="url(#cubeShadow)" stroke="#090E17" stroke-width="12" stroke-linejoin="round">
    
    <!-- LEFT FACE: The Database Layer -->
    <polygon points="116,176 116,336 256,416 256,256" fill="url(#leftFace)" />
    
    <!-- RIGHT FACE: The Neural / Tools Layer -->
    <polygon points="256,256 256,416 396,336 396,176" fill="url(#rightFace)" />

    <!-- TOP FACE: The Unified Agent / Interface -->
    <polygon points="256,96 396,176 256,256 116,176" fill="url(#topFace)" />
    
  </g>

  <!-- ==================== FACE DETAILS (No Stroke) ==================== -->
  
  <!-- Left Face Detail: Database Stripes -->
  <g stroke="none">
    <path d="M 116,220 L 256,300 L 256,315 L 116,235 Z" fill="url(#dbHighlight)" opacity="0.8" />
    <path d="M 116,275 L 256,355 L 256,370 L 116,290 Z" fill="url(#dbHighlight)" opacity="0.6" />
    <path d="M 116,330 L 256,410 L 256,416 L 116,336 Z" fill="url(#dbHighlight)" opacity="0.4" />
  </g>

  <!-- Right Face Detail: AI / LangChain Node Network -->
  <g stroke="none">
    <!-- Connecting Lines -->
    <path d="M 300,285 L 360,225" stroke="#C084FC" stroke-width="4" />
    <path d="M 300,285 L 345,340" stroke="#C084FC" stroke-width="4" />
    <path d="M 360,225 L 375,290" stroke="#C084FC" stroke-width="4" />
    <path d="M 345,340 L 375,290" stroke="#C084FC" stroke-width="4" />
    
    <!-- Network Nodes -->
    <circle cx="300" cy="285" r="9" fill="#E9D5FF" />
    <circle cx="360" cy="225" r="7" fill="#F3E8FF" />
    <circle cx="345" cy="340" r="8" fill="#D8B4FE" />
    <circle cx="375" cy="290" r="6" fill="#F3E8FF" />
  </g>

  <!-- Top Face Detail: Glowing AI Sparkle -->
  <g stroke="none" filter="url(#sparkleGlow)" transform="translate(256, 176)">
    <!-- Main Sparkle shape -->
    <path d="M 0 -45 Q 0 0 45 0 Q 0 0 0 45 Q 0 0 -45 0 Q 0 0 0 -45 Z" fill="#FFFFFF" />
    <!-- Bright inner core -->
    <circle cx="0" cy="0" r="10" fill="#FFFFFF" filter="url(#sparkleGlow)" />
  </g>

</svg>
